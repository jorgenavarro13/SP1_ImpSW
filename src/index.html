<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automaton Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #token-output span { font-weight: bold; }
        #token-output .lexmessage { color: #f6055e; font-weight: normal; font-style: normal; }
        #token-output .error      { color: #f92672; text-decoration: underline wavy #f92672; font-weight: bold; }
        .keyword    { color: #f92672; font-style: italic; }
        .state-id   { color: #a6e22e; }
        .symbol-id  { color: #e6db74; }
        .dos-puntos { color: #ae81ff; }
        .coma       { color: #f8f8f2; }
        .punto-coma { color: #ae81ff; }
        .flecha     { color: #66d9ef; }
        .parentesis { color: #fd971f; }
        .comment    { color: #75715e; font-style: italic; }
        .identifier { color: #66d9ef; }
        .unknown    { color: #f8f8f2; }

        textarea::placeholder { color: #3e3d32; }
        textarea:focus { outline: none; }

        .field-row { border-bottom: 1px solid #3e3d32; }
        .field-row:last-child { border-bottom: none; }
    </style>
</head>

<body class="min-h-screen font-mono" style="background:#272822; color:#f8f8f2;">

    <!-- Header -->
    <header style="border-bottom:1px solid #3e3d32;" class="px-8 py-5">
        <div class="max-w-6xl mx-auto flex items-end gap-4">
            <h1 class="text-2xl font-bold" style="color:#a6e22e;">Automaton Visualizer</h1>
            <span class="text-sm pb-0.5" style="color:#75715e;">Automaton definition → lexic analysis + token stream + graph + simulator</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-8 py-8 space-y-6">

        <!-- Input section -->
        <section>
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Input</span>
                <button id="run-btn" onclick="run()"
                    class="px-6 py-2 rounded text-sm font-bold transition-opacity"
                    style="background:#a6e22e; color:#272822;">
                    &#9654; Run
                </button>
            </div>
            <textarea id="textbox" rows="10"
                class="w-full rounded p-4 text-sm resize-y"
                style="background:#1e1f1c; border:1px solid #3e3d32; color:#f8f8f2; font-family:monospace;"
                placeholder="Automata dfa[&#10;  states: [q0, q1, q2]&#10;  alphabet: [a, b]&#10;  start: q0&#10;  end: q2&#10;  transitions: [q0::a::q1, q1::b::q2]&#10;]">
            </textarea>
        </section>

        <!-- Loading -->
        <div id="loading" class="hidden text-center text-sm py-4" style="color:#75715e;">
            Processing...
        </div>

        <!-- Network / server error -->
        <div id="error-box" class="hidden rounded p-4 text-sm"
            style="background:#1e1f1c; border:1px solid #f92672; color:#f92672;"></div>

        <!-- Results (hidden until first run) -->
        <section id="results" class="hidden space-y-6">
            <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Output</span>

            <!-- Row 1: token stream + graph -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Token stream panel -->
                <div class="rounded overflow-hidden" style="border:1px solid #3e3d32;">
                    <div class="flex items-center gap-2 px-4 py-2" style="background:#1a1b18; border-bottom:1px solid #3e3d32;">
                        <span class="w-2.5 h-2.5 rounded-full" style="background:#f92672;"></span>
                        <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Token Stream</span>
                    </div>
                    <div id="token-output"
                        class="p-4 text-sm leading-relaxed overflow-auto"
                        style="background:#1e1f1c; max-height:24rem;">
                    </div>
                </div>

                <!-- Graph panel -->
                <div class="rounded overflow-hidden" style="border:1px solid #3e3d32;">
                    <div class="flex items-center gap-2 px-4 py-2" style="background:#1a1b18; border-bottom:1px solid #3e3d32;">
                        <span class="w-2.5 h-2.5 rounded-full" style="background:#66d9ef;"></span>
                        <span class="text-xs uppercase tracking-widest" style="color:#75715e;">DFA Graph</span>
                    </div>
                    <div class="p-4 flex items-center justify-center" style="background:#1e1f1c; min-height:12rem;">
                        <img id="graph-output" class="max-w-full rounded" alt="DFA graph" />
                    </div>
                </div>

            </div>

            <!-- Row 2: parse errors (only when present) -->
            <div id="parse-errors-panel" class="hidden rounded overflow-hidden" style="border:1px solid #f92672;">
                <div class="flex items-center gap-2 px-4 py-2" style="background:#1a1b18; border-bottom:1px solid #f92672;">
                    <span class="w-2.5 h-2.5 rounded-full" style="background:#f92672;"></span>
                    <span class="text-xs uppercase tracking-widest" style="color:#f92672;">Parse Errors</span>
                </div>
                <ul id="parse-errors-list"
                    class="p-4 text-sm space-y-1 list-none"
                    style="background:#1e1f1c; color:#f92672; font-family:monospace;">
                </ul>
            </div>

            <!-- Row 3: parsed automaton structure -->
            <div class="rounded overflow-hidden" style="border:1px solid #3e3d32;">
                <div class="flex items-center gap-2 px-4 py-2" style="background:#1a1b18; border-bottom:1px solid #3e3d32;">
                    <span class="w-2.5 h-2.5 rounded-full" style="background:#ae81ff;"></span>
                    <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Parsed Automaton</span>
                </div>
                <div id="automaton-output"
                    class="text-sm"
                    style="background:#1e1f1c;">
                </div>
            </div>

        </section>

    </main>

    <script>
        function esc(s) {
            return String(s ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
        }

        function renderParseErrors(errors) {
            const panel = document.getElementById("parse-errors-panel");
            const list  = document.getElementById("parse-errors-list");
            if (errors && errors.length > 0) {
                list.innerHTML = errors.map(e => `<li>⚠ ${esc(e)}</li>`).join("");
                panel.classList.remove("hidden");
            } else {
                panel.classList.add("hidden");
            }
        }

        function renderAutomaton(aut) {
            const out = document.getElementById("automaton-output");

            const field = (label, content) =>
                `<div class="field-row flex gap-4 px-4 py-2">
                    <span class="w-28 shrink-0 text-xs pt-0.5 uppercase tracking-widest" style="color:#75715e;">${label}</span>
                    <span class="leading-relaxed">${content}</span>
                 </div>`;

            const stateTag = s =>
                `<span class="inline-block px-1.5 py-0.5 rounded mr-1 text-xs" style="background:#1a1b18; color:#a6e22e; border:1px solid #3e3d32;">${esc(s)}</span>`;

            const symTag = s =>
                `<span class="inline-block px-1.5 py-0.5 rounded mr-1 text-xs" style="background:#1a1b18; color:#e6db74; border:1px solid #3e3d32;">${esc(s)}</span>`;

            const arrow = `<span style="color:#ae81ff;" class="mx-1">::</span>`;

            const transitionRows = (aut.transitions || []).map(t =>
                `<div class="flex items-center gap-1 py-1">
                    ${stateTag(t[0])} ${arrow} ${symTag(t[1])} ${arrow} ${stateTag(t[2])}
                 </div>`
            ).join("") || `<span style="color:#3e3d32;">—</span>`;

            out.innerHTML =
                field("name",        `<span style="color:#66d9ef;">${esc(aut.name) || "—"}</span>`) +
                field("start",       aut.start   ? stateTag(aut.start)   : `<span style="color:#3e3d32;">—</span>`) +
                field("end",         aut.end     ? stateTag(aut.end)     : `<span style="color:#3e3d32;">—</span>`) +
                field("states",      (aut.states   || []).length ? (aut.states   || []).map(stateTag).join("") : `<span style="color:#3e3d32;">—</span>`) +
                field("alphabet",    (aut.alphabet || []).length ? (aut.alphabet || []).map(symTag).join("")   : `<span style="color:#3e3d32;">—</span>`) +
                field("transitions", transitionRows);
        }

        async function run() {
            const text    = document.getElementById("textbox").value.trim();
            const btn     = document.getElementById("run-btn");
            const loading = document.getElementById("loading");
            const errBox  = document.getElementById("error-box");
            const results = document.getElementById("results");

            errBox.classList.add("hidden");
            results.classList.add("hidden");
            loading.classList.remove("hidden");
            btn.disabled = true;
            btn.style.opacity = "0.5";

            try {
                const response = await fetch("/", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ input: text })
                });

                if (!response.ok) throw new Error("Server error: " + response.status);

                const data = await response.json();

                document.getElementById("token-output").innerHTML = data.result;
                document.getElementById("graph-output").src = "data:image/png;base64," + data.image;

                renderParseErrors(data.parseErrors  || []);
                renderAutomaton(  data.automaton    || {});

                results.classList.remove("hidden");

            } catch (err) {
                errBox.textContent = err.message;
                errBox.classList.remove("hidden");
            } finally {
                loading.classList.add("hidden");
                btn.disabled = false;
                btn.style.opacity = "1";
            }
        }
    </script>

</body>
</html>
