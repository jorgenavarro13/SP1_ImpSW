<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Racket App</title>

     <!-- estilos en css -->
    <style>

		#output {
			background: #ffffff;
			color: #f8f8f2;
			font-family: monospace;
			font-size: 15px;
			padding: 20px;
			border-radius: 6px;
		}

		#output span { font-weight: bold; }

		.keyword    { color: #f92672; font-style: italic; }
		.state-id   { color: #a6e22e; }
		.symbol-id  { color: #e6db74; }
		.dos-puntos { color: #ae81ff; }
		.coma       { color: #000000; }
		.punto-coma { color: #ae81ff; }
		.flecha     { color: #66d9ef; }
		.parentesis { color: #fd971f; }
		.comment    { color: #75715e; font-style: italic; }
		.identifier { color: #3659c4; }
		.unknown    { color: #000000; }
	</style>

</head>

<body>

    <h1>Racket Hello App</h1>

    <!-- el textbox -->
    <textarea id="textbox" rows="10"  cols="50"></textarea>
    <br><br>

    <!-- el boton, llama a la funcion run -->
    <button onclick="run()"> Run </button>
    <br><br>

    <!-- salida va en este div llamado output -->
    <div id="output"></div>

    <script>
		async function run() {

			/* Usa la funcion getElementById de document para extrater el value del textbox */
		    const text =  document.getElementById("textbox").value;

		    /* Construye la peticion */ 
		    const response = await fetch("/", {
		        method: "POST", /* cual metodo deberias usar?  */

		        headers: { "Content-Type": "application/json" },

		        body: JSON.stringify({
		            /*Forma el json, para enviar el text ingresado */
                      input: text
 		        })
		    });

		    const data = await response.json();

		    /* Extrae los datos de la respuesta: texto resultado e imagen codificada 
		       Usa getElementById asignar contenido en html al div output  */
		    document.getElementById("output").innerHTML =  data.result 
			+ "<br><br>" 
			+ "<img src='data:image/png;base64," 
			+ data.image + "' />";
		}
    </script>

</body>
</html>
