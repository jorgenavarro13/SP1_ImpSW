<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automaton Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #token-output span { font-weight: bold; }
        #token-output .lexmessage { color: #f6055e; font-weight: normal; font-style: normal; }
        #token-output .error      { color: #f92672; text-decoration: underline wavy #f92672; font-weight: bold; }
        .keyword    { color: #f92672; font-style: italic; }
        .state-id   { color: #a6e22e; }
        .symbol-id  { color: #e6db74; }
        .dos-puntos { color: #ae81ff; }
        .coma       { color: #f8f8f2; }
        .punto-coma { color: #ae81ff; }
        .flecha     { color: #66d9ef; }
        .parentesis { color: #fd971f; }
        .comment    { color: #75715e; font-style: italic; }
        .identifier { color: #66d9ef; }
        .unknown    { color: #f8f8f2; }

        textarea::placeholder { color: #3e3d32; }
        textarea:focus { outline: none; }
        textarea.has-error { border-color: #f92672 !important; }
        .badge-dfa { background:rgba(166,226,46,0.13);  color:#a6e22e; border:1px solid #a6e22e; }
        .badge-nfa { background:rgba(102,217,239,0.13); color:#66d9ef; border:1px solid #66d9ef; }
        .badge-pda { background:rgba(174,129,255,0.13); color:#ae81ff; border:1px solid #ae81ff; }
    </style>
</head>

<body class="min-h-screen font-mono" style="background:#272822; color:#f8f8f2;">

    <!-- Header -->
    <header style="border-bottom:1px solid #3e3d32;" class="px-8 py-5">
        <div class="max-w-6xl mx-auto flex items-end gap-4">
            <h1 class="text-2xl font-bold" style="color:#a6e22e;">Automaton Visualizer</h1>
            <span class="text-sm pb-0.5" style="color:#75715e;">Automaton definition → lexic analysis + token stream + graph + simulator</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-8 py-8 space-y-6">

        <!-- Input section -->
        <section>
            <div class="flex items-center justify-between mb-3">
                <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Input</span>
                <button id="run-btn" onclick="run()"
                    class="px-6 py-2 rounded text-sm font-bold transition-opacity"
                    style="background:#a6e22e; color:#272822;">
                    &#9654; Run
                </button>
            </div>
            <textarea id="textbox" rows="10"
                class="w-full rounded p-4 text-sm resize-y"
                style="background:#1e1f1c; border:1px solid #3e3d32; color:#f8f8f2; font-family:monospace;"
                placeholder="Automata dfa[&#10;
                states: [q0, q1, q2]&#10;
                alphabet :[a, b]&#10;
                start :q0&#10;
                end :q2&#10;
                transitions :[q0::a::q1, q1::b::q2]&#10;
                ]">
            </textarea>
        </section>

        <!-- Loading -->
        <div id="loading" class="hidden text-center text-sm py-4" style="color:#75715e;">
            Processing...
        </div>

        <!-- Network / server error -->
        <div id="error-box" class="hidden rounded p-4 text-sm"
            style="background:#1e1f1c; border:1px solid #f92672; color:#f92672;"></div>

        <!-- Parser / semantic errors (shown for both Run and Simulate) -->
        <div id="syntax-errors" class="hidden rounded overflow-hidden"
             style="border:1px solid #f92672;">
            <div class="flex items-center gap-2 px-4 py-2"
                 style="background:#1a1b18; border-bottom:1px solid #f92672;">
                <span class="w-2.5 h-2.5 rounded-full" style="background:#f92672;"></span>
                <span class="text-xs uppercase tracking-widest font-bold" style="color:#f92672;">Errors</span>
            </div>
            <ol id="syntax-error-list"
                class="p-4 text-sm space-y-1 list-decimal list-inside"
                style="background:#1e1f1c; color:#f92672; font-family:monospace;"></ol>
        </div>

        <!-- Results (hidden until first run) -->
        <section id="results" class="hidden">
            <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Output</span>
            <div class="mt-3 grid grid-cols-1 md:grid-cols-2 gap-6">

                <!-- Token stream panel -->
                <div class="rounded overflow-hidden" style="border:1px solid #3e3d32;">
                    <div class="flex items-center gap-2 px-4 py-2" style="background:#1a1b18; border-bottom:1px solid #3e3d32;">
                        <span class="w-2.5 h-2.5 rounded-full" style="background:#f92672;"></span>
                        <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Token Stream</span>
                    </div>
                    <div id="token-output"
                        class="p-4 text-sm leading-relaxed overflow-auto"
                        style="background:#1e1f1c; max-height:24rem;">
                    </div>
                </div>

                <!-- Graph panel -->
                <div class="rounded overflow-hidden" style="border:1px solid #3e3d32;">
                    <div class="flex items-center gap-2 px-4 py-2" style="background:#1a1b18; border-bottom:1px solid #3e3d32;">
                        <span class="w-2.5 h-2.5 rounded-full" style="background:#66d9ef;"></span>
                        <span id="graph-panel-label" class="text-xs uppercase tracking-widest" style="color:#75715e;">Automaton Graph</span>
                        <span id="mode-badge" class="hidden text-xs font-bold px-2 py-0.5 rounded" style="font-family:monospace;"></span>
                    </div>
                    <div class="p-4 flex items-center justify-center" style="background:#1e1f1c; min-height:12rem;">
                        <img id="graph-output" class="max-w-full rounded" alt="DFA graph" />
                    </div>
                </div>

            </div>

            <!-- Simulator panel -->
            <div class="mt-6 rounded overflow-hidden" style="border:1px solid #3e3d32;">
                <div class="flex items-center gap-2 px-4 py-2" style="background:#1a1b18; border-bottom:1px solid #3e3d32;">
                    <span class="w-2.5 h-2.5 rounded-full" style="background:#e6db74;"></span>
                    <span class="text-xs uppercase tracking-widest" style="color:#75715e;">Simulator</span>
                </div>
                <div class="p-4" style="background:#1e1f1c;">
                    <div class="flex gap-3 items-center">
                        <input id="sim-input" type="text"
                            class="flex-1 rounded px-4 py-2 text-sm"
                            style="background:#272822; border:1px solid #3e3d32; color:#f8f8f2; font-family:monospace; outline:none;"
                            placeholder="Enter a string to simulate, e.g. ab" />
                        <button id="sim-btn" onclick="simulate()"
                            class="px-5 py-2 rounded text-sm font-bold transition-opacity"
                            style="background:#e6db74; color:#272822;">
                            &#9654; Simulate
                        </button>
                    </div>
                    <div id="sim-result" class="mt-3 text-sm hidden">
                        <span id="sim-verdict" class="font-bold"></span>
                        <span id="sim-path" class="ml-3" style="color:#75715e;"></span>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <script src="index.js"></script>

</body>
</html>
